version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: vidego-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vidego
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - vidego-net

  redis:
    image: redis:7-alpine
    container_name: vidego-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vidego-net

  minio:
    image: minio/minio:latest
    container_name: vidego-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - vidego-net

networks:
  vidego-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
