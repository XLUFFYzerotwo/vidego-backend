# =====================================================
# Vidego Backend — 开发环境配置示例
# 使用前复制为 application-dev.yml 并填入实际参数
# =====================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vidego?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000

vidego:
  jwt:
    secret: "your-jwt-secret-base64-encoded-at-least-256-bits"
    access-token-expiration: 7200000       # 2 hours
    refresh-token-expiration: 1209600000   # 14 days

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-video: vidego-videos
    bucket-avatar: vidego-avatars
    bucket-cover: vidego-covers
