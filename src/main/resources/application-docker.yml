spring:
  datasource:
    url: jdbc:mysql://vidego-mysql:3306/vidego?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: vidego-redis
      port: 6379
      timeout: 3000

vidego:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 7200000
    refresh-token-expiration: 1209600000

  minio:
    endpoint: http://vidego-minio:9000
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket-video: vidego-videos
    bucket-avatar: vidego-avatars
    bucket-cover: vidego-covers

# 关闭 MyBatis-Plus SQL 日志（生产环境）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
